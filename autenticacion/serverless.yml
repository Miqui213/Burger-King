service: burger-king-autenticacion

provider:
  name: aws
  runtime: python3.13
  region: us-east-1
  memorySize: 256
  timeout: 20
  iam:
    role: arn:aws:iam::${env:AWS_ACCOUNT_ID}:role/LabRole
  environment:
    TABLA_USUARIOS: Burger-Usuarios-${sls:stage, 'dev'}
    TABLA_EMPLEADOS: Burger-Empleados-${sls:stage, 'dev'}
    TABLA_TOKENS: Burger-Tokens-Usuarios-${sls:stage, 'dev'}
  httpApi:
    cors: true

layers:
  DependenciasLayer:
    arn: !ImportValue BurgerKing-Python-Layer-Version

functions:
  crearUsuario:
    handler: handlers/crear_usuario.lambda_handler
    layers:
      - { Ref: DependenciasLayer }
    events:
      - httpApi:
          method: POST
          path: /auth/register

  loginUsuario:
    handler: handlers/login_usuario.lambda_handler
    layers:
      - { Ref: DependenciasLayer }
    events:
      - httpApi:
          method: POST
          path: /auth/login

  validarToken:
    name: ValidarTokenAcceso
    handler: handlers/validar_token.lambda_handler
    layers:
      - { Ref: DependenciasLayer }

resources:
  Resources:
    UsuariosTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: Burger-Usuarios-${sls:stage, 'dev'}
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: usuario_id
            AttributeType: S
        KeySchema:
          - AttributeName: usuario_id
            KeyType: HASH

    EmpleadosTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: Burger-Empleados-${sls:stage, 'dev'}
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: empleado_id
            AttributeType: S
        KeySchema:
          - AttributeName: empleado_id
            KeyType: HASH

    TokensTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: Burger-Tokens-Usuarios-${sls:stage, 'dev'}
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: token_id
            AttributeType: S
        KeySchema:
          - AttributeName: token_id
            KeyType: HASH